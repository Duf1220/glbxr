<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0" />
  <title>WebGL Test</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 600px; height: 600px; background: #000; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #fff; font: 14px system-ui;
      background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px;
    }
  </style>
</head>
<body>
<div id="info">Loading Three.js…</div>
<script type="importmap">
{"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js"}}
</script>
<script type="module">
// Initialize Vercel Web Analytics
import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/+esm';
import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@1/+esm';
inject();
injectSpeedInsights();

const info = document.getElementById('info');
try {
  info.textContent = 'Importing Three.js…';
  const THREE = await import('three');
  info.textContent = 'Creating renderer…';

  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(1);
  renderer.setSize(600, 600);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111122);

  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
  camera.position.set(0, 0, 3);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const light = new THREE.DirectionalLight(0xffffff, 2);
  light.position.set(1, 2, 3);
  scene.add(light);

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshLambertMaterial({ color: 0x3182ce })
  );
  scene.add(mesh);

  info.textContent = '✓ WebGL OK — cube rendering';

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.01;
    mesh.rotation.x = t * 0.7;
    mesh.rotation.y = t;
    renderer.render(scene, camera);
  }
  animate();

} catch(e) {
  info.textContent = '✗ Error: ' + e.message;
}
</script>
</body>
</html>
